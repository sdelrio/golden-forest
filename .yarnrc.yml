# 1. Equivalent to minimumReleaseAge: 10080
# Yarn supports duration strings like "7d", or raw minutes
npmMinimalAgeGate: 7d

# 2. Equivalent to blockExoticSubdeps: true
# Blocks unapproved git/tarball sources. If you want to block all, 
# you enforce an empty array, or explicitly define only your trusted orgs.
approvedGitRepositories: []

# 3. Equivalent to strictDepBuilds: true
# Yarn takes a secure-by-default stance: this disables all build scripts 
# globally unless they are explicitly opted-in via package.json.
enableScripts: false

# Add this to your .yarnrc.yml to block un-vetted lockfile modifications
enableImmutableInstalls: true

