# Yarn Security Configuration
# Protects against lifecycle script injection attacks (e.g., TanStack May 2026 compromise)
#
# Usage: Place in project root as .yarnrc.yml or in ~/.yarnrc.yml for global protection
# Requires Yarn v2+ (Berry)

# Block ALL lifecycle scripts (preinstall, postinstall, install, prepare)
# This is the PRIMARY defense against script injection attacks
enableScripts: false

# Reject packages published less than 24 hours ago (1440 minutes)
# Gives security researchers time to detect and flag malicious releases
minimumReleaseAge: 1440

# Enforce lockfile immutability to prevent unauthorized dependency changes
enableImmutableInstalls: true

# Use strict SSL verification for registry connections
enableStrictSsl: true
