---
name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see added.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: If you have an idea for how this could be implemented, describe it here.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the site does this relate to?
      options:
        - Content / MDX articles
        - DnD tools
        - AI Dashboard / Mermaid Playground
        - Build / CI / Tooling
        - Other
    validations:
      required: true
