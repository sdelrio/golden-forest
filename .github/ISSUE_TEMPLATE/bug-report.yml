---
name: Bug Report
description: Report a bug or broken feature
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the site is affected?
      options:
        - Documentation / MDX content
        - DnD tools (XmlChar, CharSearch, etc.)
        - AI Dashboard / Mermaid Playground
        - Build / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS: [e.g. macOS, Windows]
        - Node version: [e.g. 20.x]
        - Browser (if visual): [e.g. Chrome 120]
    validations:
      required: false
